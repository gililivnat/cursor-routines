# cursor-routines configuration
# Generated by the onboarding skill. Edit manually or re-run onboarding to update.

# ── Workspace ──────────────────────────────────────────────
workspace_path: ""              # absolute path to your workspace root
routines_path: ""               # relative path from workspace root to the routines/ folder
output_path: "Output"           # relative path from workspace root for saved reports and summaries

# ── Product ────────────────────────────────────────────────
product_name: ""                # your product or project name (used in report titles)
channel_keyword: ""             # Slack channel search keyword (e.g. "product", "marketing")
competitors: []                 # list of competitor names for intel tracking
  # - "Competitor A"
  # - "Competitor B"

# ── Slack ──────────────────────────────────────────────────
slack_user_id: ""               # your Slack member ID (starts with U, e.g. "U01ABC2DEF3")
support_channel: ""             # Slack channel for customer questions (e.g. "ask-product")
churn_channel: ""               # Slack channel for churn notifications (e.g. "product-churns")

# ── Data ───────────────────────────────────────────────────
data_warehouse_mcp: ""          # MCP server name for your data warehouse (e.g. "user-snowflake")
data_guide_path: ""             # path to data schema/guide docs (relative to workspace)
strategy_doc_path: ""           # path to product strategy docs (relative to workspace)
key_metrics: []                 # key metrics to track daily
  # - "DAU"
  # - "MAU"
  # - "Revenue"

# ── Task Manager ──────────────────────────────────────────
task_manager_mcp: ""            # MCP server name (e.g. "user-todoist", "user-linear")
task_project: ""                # default project for new tasks (e.g. "Work")
task_section: ""                # default section within the project (e.g. "To Do")

# ── Meetings ──────────────────────────────────────────────
notetaker_mcp: ""               # MCP server name for meeting notes (e.g. "user-meeting-notes")
notetaker_tool: ""              # tool name for retrieving meetings (e.g. "get_meetings")

# ── Optional Integrations ─────────────────────────────────
analytics_mcp: ""               # analytics platform MCP (e.g. "user-mixpanel", "user-amplitude")
analytics_project_id: ""        # project ID for your analytics platform
calendar_mcp: ""                # calendar MCP server name (enables review-upcoming-meetings)
gmail_mcp: ""                   # Gmail MCP server name (enables review-gmail)
